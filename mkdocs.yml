site_name: VirtusCo Docs
site_url: https://virtusco.github.io/Virtus-docs
site_description: Documentation for VirtusCo autonomous robotics platform — Porter Robot, VS Code extensions, SDK, and fleet management.
site_author: VirtusCo

repo_name: VirtusCo/Virtus-docs
repo_url: https://github.com/VirtusCo/Virtus-docs

theme:
  name: material
  custom_dir: docs/overrides
  palette:
    - scheme: slate
      primary: black
      accent: deep-orange
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: black
      accent: deep-orange
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  font: false
  features:
    - navigation.instant
    - navigation.instant.progress
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - navigation.path
    - navigation.footer
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - toc.follow
  icon:
    repo: fontawesome/brands/github
  logo: assets/Darkmode.png
  favicon: assets/favicon.ico

plugins:
  - search
  - tags

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - tables
  - attr_list
  - md_in_html
  - def_list
  - footnotes
  - toc:
      permalink: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/VirtusCo
      name: GitHub
    - icon: fontawesome/brands/linkedin
      link: https://www.linkedin.com/company/virtusco
      name: LinkedIn
    - icon: fontawesome/solid/globe
      link: https://virtusco.in
      name: Website
  generator: false

extra_css:
  - stylesheets/extra.css

copyright: Copyright &copy; 2025-2026 VirtusCo

nav:
  - Home: index.md
  - Getting Started:
    - Overview: getting-started/overview.md
    - Hardware Setup: getting-started/hardware.md
    - Software Setup: getting-started/software.md
  - Architecture:
    - System Overview: architecture/system.md
    - ROS 2 Topics: architecture/topics.md
    - ESP32 Protocol: architecture/protocol.md
    - AI Assistant: architecture/ai.md
  - Extensions:
    - Extension Suite: extensions/index.md
    - Firmware Builder: extensions/firmware-builder.md
    - AI Studio: extensions/ai-studio.md
    - ROS 2 Studio: extensions/ros2-studio.md
    - Hardware Dashboard: extensions/hardware-dashboard.md
    - Simulation Manager: extensions/simulation-manager.md
    - PCB Studio: extensions/pcb-studio.md
  - Infrastructure:
    - SDK: infrastructure/sdk.md
    - Fleet Backend: infrastructure/fleet.md
    - Configuration: infrastructure/configs.md
  - Plans:
    - Repo Split: plans/repo-split.md
    - Language Migration: plans/migration.md
  - Dev Logs: devlogs/index.md
  - Company: company.md
